<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="css/style.css">
  <title>Frontend Mentor | Interactive card details form</title>


</head>

<body>
  <wrapper class="wrapper">
    <header class="header">
      <img src="./img/bg-main-mobile.png" alt="">
      <div class="card front">
        <img src="./img/card-logo.svg" alt="card-logo" aria-hidden="true">
        <p>1234 5678 9123 0000</p>
        <p>Jane Appleseed <span>00/00</span></p>
      </div>
      <div class="card back">
        <p>000</p>
      </div>
    </header>
    <main>
      <form class="form">
        <fieldset>
          <label for="name">Cardholder Name</label>
          <input type="text" name="name" placeholder="e.g. Jane Appleseed">
        </fieldset>
        <fieldset>
          <label for="cardNumber">Card Number
            <input type="number" name="cardNumber" placeholder="e.g. 1234 5678 9123 0000">
          </label>
        </fieldset>
        <fieldset class="expDate__container">
          <label for="expDate"> Exp. Date (MM/YY)
            <div class="date">
              <input type="number" name="expDate" placeholder="MM">
              <input type="number" name="expDate" placeholder="YY">
            </div>
          </label>
          <label for="cvc"> cvc
            <input type="number" name="cvc" placeholder="eg 123">
          </label>
        </fieldset>
        <button class="btn__confirm">confirm</button>
      </form>
    </main>

    <!-- Completed state start -->

    <!-- Thank you!
  We've added your card details
  Continue -->
    <!--  -->
  </wrapper>
  <footer class="footer">
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://www.frontendmentor.io/profile/Shroomsky" target="_blank">@Shroomsky</a>.
    </p>
  </footer>
</body>

</html>
